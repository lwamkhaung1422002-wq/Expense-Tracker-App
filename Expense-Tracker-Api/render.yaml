services:
  - type: web
    runtime: node
    name: expense-tracker-api
    region: singapore
    plan: starter
    buildCommand: npm run render:build
    preDeployCommand: npm run render:predeploy
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: expense-tracker-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/expense-tracker.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false
      - key: TRUST_PROXY
        value: "true"
